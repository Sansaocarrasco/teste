<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Distribulanche</title>
    <style>
        /* Estilos básicos */
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ff7e5f, #feb47b);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
            overflow: hidden;
        }

        .register-container {
            background: white;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
            animation: fadeIn 1s ease-out;
        }

        .register-container h2 {
            margin-bottom: 20px;
            font-size: 28px;
            font-weight: bold;
            color: #ff7e5f;
        }

        .register-container form {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .register-container form input {
            width: 100%;
            max-width: 300px;
            margin-bottom: 15px;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 5px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .register-container form input:focus {
            border-color: #ff7e5f;
        }

        .register-container form button {
            background: linear-gradient(135deg, #ff7e5f, #feb47b);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .register-container form button:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 10px rgba(255, 126, 95, 0.5);
        }

        .register-container .footer {
            margin-top: 15px;
            font-size: 14px;
            color: #555;
        }

        .register-container .footer a {
            color: #ff7e5f;
            text-decoration: none;
            font-weight: bold;
        }

        .register-container .footer a:hover {
            text-decoration: underline;
        }

        /* Animação */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10%);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <h2>Registro | Distribulanche</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Registrar</button>
        </form>
        <div class="footer">
            <p>Já tem uma conta? Faça login</a></p>
        </div>
    </div>
</body>
</html>
